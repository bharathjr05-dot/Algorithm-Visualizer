<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Algorithm Visualizer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Analytics Dashboard</h1>
        <a href="/" class="btn">Back to Home</a>
    </header>
    
    <main>
        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div id="totalUsers" class="stat-number">-</div>
            </div>
            
            <div class="stat-card">
                <h3>Total Sessions</h3>
                <div id="totalSessions" class="stat-number">-</div>
            </div>
            
            <div class="stat-card">
                <h3>Completed Sessions</h3>
                <div id="completedSessions" class="stat-number">-</div>
            </div>
            
            <div class="stat-card">
                <h3>Success Rate</h3>
                <div id="successRate" class="stat-number">-</div>
            </div>
        </div>
        
        <div class="analytics-section">
            <h2>Top Performers</h2>
            <div id="topPerformers"></div>
        </div>
        
        <div class="analytics-section">
            <h2>Algorithm Statistics</h2>
            <div id="algorithmStats"></div>
        </div>
        
        <div class="analytics-section">
            <h2>User Performance Analysis</h2>
            <div id="userPerformance"></div>
        </div>
    </main>
    
    <script>
        // Load dashboard data
        fetch('/api/analytics/dashboard')
        .then(response => response.json())
        .then(data => {
            document.getElementById('totalUsers').textContent = data.totalUsers;
            document.getElementById('totalSessions').textContent = data.totalSessions;
            document.getElementById('completedSessions').textContent = data.completedSessions;
            
            const successRate = ((data.completedSessions / data.totalSessions) * 100).toFixed(1);
            document.getElementById('successRate').textContent = successRate + '%';
            
            // Top Performers
            let topHtml = '<table><tr><th>User</th><th>Skill Level</th><th>Algorithms Completed</th></tr>';
            data.topPerformers.forEach(user => {
                topHtml += `<tr><td>${user.username}</td><td>${user.skillLevel}</td><td>${user.totalAlgorithmsCompleted || 0}</td></tr>`;
            });
            topHtml += '</table>';
            document.getElementById('topPerformers').innerHTML = topHtml;
        });
        
        // Load algorithm statistics
        fetch('/api/analytics/algorithm-difficulty')
        .then(response => response.json())
        .then(data => {
            let statsHtml = '<table><tr><th>Algorithm</th><th>Difficulty</th><th>Complexity</th><th>Sessions</th><th>Avg Time</th><th>Avg Score</th><th>Success Rate</th></tr>';
            data.forEach(row => {
                statsHtml += `<tr>
                    <td>${row[0]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                    <td>${row[4] ? row[4] + 's' : 'N/A'}</td>
                    <td>${row[5] ? row[5] + '%' : 'N/A'}</td>
                    <td>${row[6] ? row[6] + '%' : 'N/A'}</td>
                </tr>`;
            });
            statsHtml += '</table>';
            document.getElementById('algorithmStats').innerHTML = statsHtml;
        });
        
        // Load user performance
        fetch('/api/analytics/user-performance')
        .then(response => response.json())
        .then(data => {
            let perfHtml = '<table><tr><th>User</th><th>Skill Level</th><th>Algorithms Attempted</th><th>Total Completions</th><th>Avg Score</th><th>Achievements</th></tr>';
            data.forEach(row => {
                perfHtml += `<tr>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                    <td>${row[4]}</td>
                    <td>${row[5] ? row[5].toFixed(1) + '%' : 'N/A'}</td>
                    <td>${row[7]}</td>
                </tr>`;
            });
            perfHtml += '</table>';
            document.getElementById('userPerformance').innerHTML = perfHtml;
        });
    </script>
</body>
</html>
