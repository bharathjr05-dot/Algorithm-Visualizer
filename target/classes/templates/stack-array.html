<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack using Array - Algorithm Visualizer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/datastructures.css}">
    <style>
        .array-stack-vertical {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 0 auto;
            min-width: 200px;
        }
        .array-cell-vertical {
            width: 120px;
            height: 60px;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }
        .array-cell-vertical.filled {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: rgba(255,255,255,0.3);
        }
        .array-cell-vertical.top-element {
            background: linear-gradient(135deg, #00b894 0%, #00a085 100%);
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
            transform: scale(1.05);
        }
        .array-index-vertical {
            position: absolute;
            left: -30px;
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        .message-success { background: linear-gradient(135deg, #00b894 0%, #00a085 100%); }
        .message-error { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%); }
        .message-info { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stack using Array (Fixed Size)</h1>
        <a href="/datastructures" class="back-btn">← Back to Data Structures</a>

        <div class="controls">
            <div class="input-group">
                <input type="number" id="stackValue" placeholder="Enter value (1-100)" min="1" max="100">
                <button onclick="push()" class="btn-primary">🔼 Push</button>
            </div>
            <div class="button-group">
                <button onclick="pop()" class="btn-danger">🔽 Pop</button>
                <button onclick="peek()" class="btn-info">👁️ Peek</button>
                <button onclick="clearStack()" class="btn-warning">🗑️ Clear</button>
            </div>
        </div>

        <div class="visualization-area">
            <div class="array-stack-vertical" id="arrayStack">
                <div class="stack-pointer">TOP → <span id="topPointer">2</span></div>
            </div>
        </div>

        <div class="info-panel">
            <h3>📊 Stack Array Information</h3>
            <div>
                <div class="info-item">
                    <span class="info-label">📏 Size:</span>
                    <span id="stackSize" class="info-value">3</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📦 Capacity:</span>
                    <span class="info-value">5</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📍 Top Index:</span>
                    <span id="topIndex" class="info-value">2</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        var stack = [10, 20, 30, null, null];
        var topIndex = 2;
        var capacity = 5;

        function updateDisplay() {
            var container = document.getElementById('arrayStack');
            var html = '<div class="stack-pointer">TOP → <span id="topPointer">' + topIndex + '</span></div>';
            
            for (var i = capacity - 1; i >= 0; i--) {
                var value = stack[i] === null ? '' : stack[i];
                var className = 'array-cell-vertical';
                if (stack[i] !== null) className += ' filled';
                if (i === topIndex && stack[i] !== null) className += ' top-element';
                
                html += '<div class="' + className + '">';
                html += '<div class="array-index-vertical">' + i + '</div>';
                html += value;
                html += '</div>';
            }
            
            container.innerHTML = html;
            document.getElementById('stackSize').textContent = topIndex >= 0 ? topIndex + 1 : 0;
            document.getElementById('topIndex').textContent = topIndex;
        }

        function showMessage(message, type) {
            var messageDiv = document.createElement('div');
            messageDiv.className = 'message message-' + type;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);
            setTimeout(function() {
                if (messageDiv.parentNode) {
                    messageDiv.parentNode.removeChild(messageDiv);
                }
            }, 3000);
        }

        function push() {
            var input = document.getElementById('stackValue');
            var value = input.value;
            
            if (!value) {
                showMessage('Please enter a value', 'error');
                return;
            }
            
            if (topIndex >= capacity - 1) {
                showMessage('Stack Overflow! Array is full', 'error');
                return;
            }
            
            var num = parseInt(value);
            topIndex++;
            stack[topIndex] = num;
            input.value = '';
            updateDisplay();
            showMessage('Pushed ' + num + ' at index ' + topIndex, 'success');
        }

        function pop() {
            if (topIndex < 0) {
                showMessage('Stack Underflow! Array is empty', 'error');
                return;
            }
            
            var poppedValue = stack[topIndex];
            stack[topIndex] = null;
            topIndex--;
            updateDisplay();
            showMessage('Popped value: ' + poppedValue, 'success');
        }

        function peek() {
            if (topIndex < 0) {
                showMessage('Stack is empty! Nothing to peek', 'error');
                return;
            }
            
            showMessage('Top value: ' + stack[topIndex] + ' at index ' + topIndex, 'info');
        }

        function clearStack() {
            if (topIndex < 0) {
                showMessage('Stack is already empty', 'info');
                return;
            }
            
            for (var i = 0; i < capacity; i++) {
                stack[i] = null;
            }
            topIndex = -1;
            updateDisplay();
            showMessage('Stack cleared successfully', 'success');
        }

        document.getElementById('stackValue').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                push();
            }
        });

        updateDisplay();
        setTimeout(function() {
            showMessage('Stack initialized with default values: 10, 20, 30', 'info');
        }, 500);
    </script>
</body>
</html>
