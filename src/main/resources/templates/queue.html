<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Visualization - Algorithm Visualizer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/datastructures.css}">
    <style>
        .queue-container {
            display: flex;
            align-items: center;
            gap: 3px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 0 auto;
            min-width: 400px;
        }
        .queue-element {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }
        .queue-element.front {
            background: linear-gradient(135deg, #00b894 0%, #00a085 100%);
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
        }
        .queue-element.rear {
            background: linear-gradient(135deg, #e17055 0%, #d63031 100%);
            box-shadow: 0 4px 15px rgba(225, 112, 85, 0.4);
        }
        .queue-pointers {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            width: 100%;
        }
        .pointer {
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        .message-success { background: linear-gradient(135deg, #00b894 0%, #00a085 100%); }
        .message-error { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%); }
        .message-info { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Queue Visualization (FIFO)</h1>
        <a href="/datastructures" class="back-btn">← Back to Data Structures</a>

        <div class="controls">
            <div class="input-group">
                <input type="number" id="queueValue" placeholder="Enter value (1-100)" min="1" max="100">
                <button onclick="enqueue()" class="btn-primary">➡️ Enqueue</button>
            </div>
            <div class="button-group">
                <button onclick="dequeue()" class="btn-danger">⬅️ Dequeue</button>
                <button onclick="front()" class="btn-info">👁️ Front</button>
                <button onclick="rear()" class="btn-info">👁️ Rear</button>
                <button onclick="clearQueue()" class="btn-warning">🗑️ Clear</button>
            </div>
        </div>

        <div class="visualization-area">
            <div class="queue-container" id="queueContainer">
                <div class="queue-pointers">
                    <div class="pointer">FRONT</div>
                    <div class="pointer">REAR</div>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <h3>📊 Queue Information</h3>
            <div>
                <div class="info-item">
                    <span class="info-label">📏 Size:</span>
                    <span id="queueSize" class="info-value">3</span>
                </div>
                <div class="info-item">
                    <span class="info-label">🔄 Status:</span>
                    <span id="queueStatus" class="info-value">3/10</span>
                </div>
                <div class="info-item">
                    <span class="info-label">👆 Front:</span>
                    <span id="frontElement" class="info-value">10</span>
                </div>
                <div class="info-item">
                    <span class="info-label">👇 Rear:</span>
                    <span id="rearElement" class="info-value">30</span>
                </div>
            </div>
            <div class="operation-help">
                <h4>💡 How to use:</h4>
                <ul>
                    <li><strong>Enqueue:</strong> Add element to rear of queue</li>
                    <li><strong>Dequeue:</strong> Remove element from front of queue</li>
                    <li><strong>Front:</strong> View front element</li>
                    <li><strong>Rear:</strong> View rear element</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        var queue = [10, 20, 30];
        var maxSize = 10;

        function updateDisplay() {
            var container = document.getElementById('queueContainer');
            var html = '';
            
            for (var i = 0; i < queue.length; i++) {
                var className = 'queue-element';
                if (i === 0) className += ' front';
                if (i === queue.length - 1) className += ' rear';
                
                html += '<div class="' + className + '">' + queue[i] + '</div>';
            }
            
            html += '<div class="queue-pointers">';
            html += '<div class="pointer">FRONT</div>';
            html += '<div class="pointer">REAR</div>';
            html += '</div>';
            
            container.innerHTML = html;
            
            document.getElementById('queueSize').textContent = queue.length;
            document.getElementById('queueStatus').textContent = 
                queue.length === 0 ? 'Empty' : 
                queue.length === maxSize ? 'Full' : 
                queue.length + '/' + maxSize;
            
            document.getElementById('frontElement').textContent = queue.length > 0 ? queue[0] : 'None';
            document.getElementById('rearElement').textContent = queue.length > 0 ? queue[queue.length - 1] : 'None';
        }

        function showMessage(message, type) {
            var messageDiv = document.createElement('div');
            messageDiv.className = 'message message-' + type;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);
            setTimeout(function() {
                if (messageDiv.parentNode) {
                    messageDiv.parentNode.removeChild(messageDiv);
                }
            }, 3000);
        }

        function enqueue() {
            var input = document.getElementById('queueValue');
            var value = input.value;
            
            if (!value) {
                showMessage('Please enter a value', 'error');
                return;
            }
            
            if (queue.length >= maxSize) {
                showMessage('Queue is full! Cannot enqueue more elements', 'error');
                return;
            }
            
            var num = parseInt(value);
            queue.push(num);
            input.value = '';
            updateDisplay();
            showMessage('Enqueued ' + num + ' to rear', 'success');
        }

        function dequeue() {
            if (queue.length === 0) {
                showMessage('Queue is empty! Cannot dequeue', 'error');
                return;
            }
            
            var dequeuedValue = queue.shift();
            updateDisplay();
            showMessage('Dequeued value: ' + dequeuedValue, 'success');
        }

        function front() {
            if (queue.length === 0) {
                showMessage('Queue is empty! No front element', 'error');
                return;
            }
            
            showMessage('Front element: ' + queue[0], 'info');
        }

        function rear() {
            if (queue.length === 0) {
                showMessage('Queue is empty! No rear element', 'error');
                return;
            }
            
            showMessage('Rear element: ' + queue[queue.length - 1], 'info');
        }

        function clearQueue() {
            if (queue.length === 0) {
                showMessage('Queue is already empty', 'info');
                return;
            }
            
            queue = [];
            updateDisplay();
            showMessage('Queue cleared successfully', 'success');
        }

        document.getElementById('queueValue').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enqueue();
            }
        });

        updateDisplay();
        setTimeout(function() {
            showMessage('Queue initialized with default values: 10, 20, 30', 'info');
        }, 500);
    </script>
</body>
</html>
