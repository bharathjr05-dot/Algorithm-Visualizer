<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithms - Algorithm Visualizer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Sorting Algorithm Visualizer</h1>
        <nav class="top-nav">
            <a href="/" class="nav-link">Home</a>
            <a href="/sorting" class="nav-link active">Sorting</a>
            <a href="/searching" class="nav-link">Searching</a>
            <a href="/datastructures" class="nav-link">Data Structures</a>

            <a href="/guide" class="nav-link">📖 Guide</a>
        </nav>
    </header>
    
    <main>
        <div class="controls">
            <div class="input-section">
                <label for="arrayInput">Enter Array (comma-separated):</label>
                <input type="text" id="arrayInput" placeholder="64,34,25,12,22,11,90" value="64,34,25,12,22,11,90">
                <button onclick="parseArray()">Set Array</button>
            </div>
            
            <div class="algorithm-buttons">
                <button onclick="startVisualization('bubble-sort')">Bubble Sort</button>
                <button onclick="startVisualization('selection-sort')">Selection Sort</button>
                <button onclick="startVisualization('insertion-sort')">Insertion Sort</button>
                <button onclick="startVisualization('quick-sort')">Quick Sort</button>
                <button onclick="startVisualization('merge-sort')">Merge Sort</button>
            </div>
            
            <div class="playback-controls">
                <button id="prevBtn" onclick="previousStep()" disabled>Previous</button>
                <button id="playBtn" onclick="togglePlay()">Play</button>
                <button id="nextBtn" onclick="nextStep()" disabled>Next</button>
                <span id="stepInfo">Step: 0 / 0</span>
            </div>
        </div>
        
        <div class="concept-box" id="conceptBox" style="display: none;">
            <h3 id="conceptTitle">Algorithm Concept</h3>
            <ul id="conceptPoints"></ul>
        </div>
        
        <div class="visualization-area">
            <div id="arrayContainer"></div>
            <div id="stepDescription">Select an algorithm to start visualization</div>
        </div>
    </main>
    
    <script src="/js/sorting.js"></script>
</body>
</html>
