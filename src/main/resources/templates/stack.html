<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Visualization - Algorithm Visualizer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/datastructures.css}">
</head>
<body>

    <div class="container">
        <h1>Stack Visualization</h1>
            <a href="/" class="back-btn">← Back to Home</a>

        <div class="controls">
            <div class="input-group">
                <input type="number" id="stackValue" placeholder="Enter value (1-100)" min="1" max="100" value="">
                <button onclick="push()" class="btn-primary">🔼 Push</button>
            </div>
            <div class="button-group">
                <button onclick="pop()" class="btn-danger">🔽 Pop</button>
                <button onclick="peek()" class="btn-info">👁️ Peek</button>
                <button onclick="clearStack()" class="btn-warning">🗑️ Clear</button>
            </div>
        </div>

        <div class="visualization-area">
            <div id="stackContainer" class="stack-container">
                <div class="stack-label">Stack (LIFO)</div>
                <div id="stack" class="stack"></div>
                <div class="stack-base">Base</div>
            </div>
        </div>

        <div class="info-panel">
            <h3>📊 Stack Information</h3>
            <div id="operationInfo">
                <div class="info-item">
                    <span class="info-label">📏 Size:</span>
                    <span id="stackSize" class="info-value">3</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📈 Status:</span>
                    <span id="stackStatus" class="info-value">3/10</span>
                </div>
                <div class="info-item">
                    <span class="info-label">🔝 Top Element:</span>
                    <span id="topElement" class="info-value">30</span>
                </div>
            </div>
            <div class="operation-help">
                <h4>💡 How to use:</h4>
                <ul>
                    <li><strong>Push:</strong> Add element to top of stack</li>
                    <li><strong>Pop:</strong> Remove and return top element</li>
                    <li><strong>Peek:</strong> View top element without removing</li>
                    <li><strong>Clear:</strong> Remove all elements</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let stack = [10, 20, 30]; // Default values
        const maxSize = 10;

        function updateDisplay() {
            const stackElement = document.getElementById('stack');
            stackElement.innerHTML = '';
            
            stack.forEach((value, index) => {
                const element = document.createElement('div');
                element.className = 'stack-element';
                element.textContent = value;
                if (index === stack.length - 1) {
                    element.classList.add('top');
                }
                stackElement.appendChild(element);
            });

            document.getElementById('stackSize').textContent = stack.length;
            document.getElementById('stackStatus').textContent = 
                stack.length === 0 ? 'Empty' : 
                stack.length === maxSize ? 'Full' : 
                `${stack.length}/${maxSize}`;
            
            // Update top element display
            const topElementSpan = document.getElementById('topElement');
            if (stack.length > 0) {
                topElementSpan.textContent = stack[stack.length - 1];
                topElementSpan.style.color = '#00b894';
            } else {
                topElementSpan.textContent = 'None';
                topElementSpan.style.color = '#666';
            }
        }

        function push() {
            const value = document.getElementById('stackValue').value;
            if (!value || isNaN(value)) {
                showMessage('Please enter a valid number', 'error');
                return;
            }
            if (stack.length >= maxSize) {
                showMessage('Stack is full! Cannot push more elements.', 'error');
                return;
            }
            
            const numValue = parseInt(value);
            if (numValue < 1 || numValue > 100) {
                showMessage('Please enter a value between 1 and 100', 'error');
                return;
            }
            
            stack.push(numValue);
            document.getElementById('stackValue').value = '';
            updateDisplay();
            showMessage(`Pushed ${numValue} to stack`, 'success');
            
            // Highlight the new element
            setTimeout(() => {
                const elements = document.querySelectorAll('.stack-element');
                if (elements.length > 0) {
                    elements[elements.length - 1].classList.add('highlight');
                    setTimeout(() => {
                        elements[elements.length - 1].classList.remove('highlight');
                    }, 1000);
                }
            }, 100);
        }

        function pop() {
            if (stack.length === 0) {
                showMessage('Stack is empty! Cannot pop.', 'error');
                return;
            }
            
            const poppedValue = stack.pop();
            updateDisplay();
            showMessage(`Popped value: ${poppedValue}`, 'success');
        }

        function peek() {
            if (stack.length === 0) {
                showMessage('Stack is empty! Nothing to peek.', 'error');
                return;
            }
            
            const topValue = stack[stack.length - 1];
            showMessage(`Top value: ${topValue}`, 'info');
            
            // Highlight the top element
            const elements = document.querySelectorAll('.stack-element');
            if (elements.length > 0) {
                elements[elements.length - 1].classList.add('highlight');
                setTimeout(() => {
                    elements[elements.length - 1].classList.remove('highlight');
                }, 1000);
            }
        }

        function clearStack() {
            if (stack.length === 0) {
                showMessage('Stack is already empty!', 'info');
                return;
            }
            stack = [];
            updateDisplay();
            showMessage('Stack cleared successfully!', 'success');
        }
        
        function showMessage(message, type) {
            // Create message element
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.textContent = message;
            
            // Add to page
            document.body.appendChild(messageDiv);
            
            // Remove after 3 seconds
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }
        
        // Add keyboard support
        document.getElementById('stackValue').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                push();
            }
        });

        // Initialize display with default values
        updateDisplay();
        
        // Add some visual feedback for default values
        setTimeout(() => {
            showMessage('Welcome! Stack initialized with default values: 10, 20, 30', 'info');
            const elements = document.querySelectorAll('.stack-element');
            elements.forEach((element, index) => {
                setTimeout(() => {
                    element.classList.add('highlight');
                    setTimeout(() => {
                        element.classList.remove('highlight');
                    }, 800);
                }, index * 200);
            });
        }, 500);
    </script>
</body>
</html>
